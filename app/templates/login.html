<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 考研考公学习打卡系统</title>
    <link rel="icon" type="image/jpeg" href="/assets/images/Sun-_-.jpg">
    <link rel="apple-touch-icon" href="/assets/images/Sun-_-.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="auth-page">
<main class="auth-card">
    <div class="auth-card__head">
        <img src="/assets/images/Sun-_-.jpg" alt="备考打卡 Logo" class="auth-logo">
        <span class="auth-brand">备考打卡</span>
        <p class="auth-tagline">坚持每一天，离上岸更近一步</p>
    </div>
    <div class="auth-card__body">
        <form id="loginForm" novalidate>
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" required autocomplete="username">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" class="form-control" id="password" required autocomplete="current-password">
            </div>
            <div id="loginError" class="alert alert-danger d-none py-2 small"></div>
            <button type="submit" class="btn btn-primary w-100">登录</button>
        </form>
        <p class="auth-switch">
            还没有账号？<a href="/register">立即注册</a>
        </p>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const errEl = document.getElementById("loginError");
    errEl.classList.add("d-none");

    try {
        const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
        });
        if (!res.ok) {
            const data = await res.json();
            errEl.textContent = data.detail || "登录失败";
            errEl.classList.remove("d-none");
            return;
        }
        window.location.href = "/";
    } catch (err) {
        errEl.textContent = "网络错误，请重试";
        errEl.classList.remove("d-none");
    }
});
</script>
</body>
</html>
